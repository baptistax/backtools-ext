<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Back Tools Export</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <div class="workspace" id="appRoot">
    <header class="hero-header">
      <div class="hero-shell">
        <div class="hero-copy">
          <div class="hero-kicker">CHROME DEVTOOLS TOOLKIT</div>
          <div class="hero-title-row">
            <h1>BackTools Export</h1>
            <span class="hero-badge">Export version</span>
          </div>
        </div>
        <div class="hero-side">
          <div class="hero-target-label">Target</div>
          <button id="targetCopyBtn" class="target-link" type="button" title="Click to copy target URL">
            <span id="targetUrl">Unavailable</span>
            <span class="target-copy-hint">Click to copy</span>
          </button>
          <div class="hero-actions">
            <button id="reloadCaptureTopBtn">Analyze and capture</button>
            <button id="exportTopBtn" disabled>Export</button>
          </div>
          <div id="exportStatusText" class="hero-status" aria-live="polite"></div>
        </div>
      </div>
    </header>

    <main class="shell-content">
      <div id="moduleContent" class="content-shell"></div>
    </main>
  </div>

  <script src="lib/zip.js"></script>
  <script src="src/domain/types.js"></script>
  <script src="src/domain/normalize.js"></script>
  <script src="src/domain/classify.js"></script>
  <script src="src/domain/targetClassification.js"></script>
  <script src="src/domain/redaction.js"></script>
  <script src="src/domain/resourceClassification.js"></script>
  <script src="src/domain/bodyPreview.js"></script>
  <script src="src/domain/pathHelpers.js"></script>
  <script src="src/domain/pathPlanner.js"></script>
  <script src="src/domain/cookies.js"></script>
  <script src="src/domain/application.js"></script>
  <script src="src/domain/exportPlan.js"></script>
  <script src="src/platform/inspectedWindowAdapter.js"></script>
  <script src="src/platform/devtoolsNetworkAdapter.js"></script>
  <script src="src/platform/runtimeBackgroundAdapter.js"></script>
  <script src="src/collectors/sourcesCollector.js"></script>
  <script src="src/collectors/networkCollector.js"></script>
  <script src="src/collectors/cookiesCollector.js"></script>
  <script src="src/collectors/applicationCollector.js"></script>
  <script src="src/export/zipWriterAdapter.js"></script>
  <script src="src/export/manifestBuilder.js"></script>
  <script src="src/export/reportBuilder.js"></script>
  <script src="src/export/captureZipWriter.js"></script>
  <script src="src/runtime/reloadAndCapture.js"></script>
  <script src="src/runtime/backToolsController.js"></script>
  <script src="src/ui/export/view.js"></script>
  <script src="src/ui/export/storage.js"></script>
  <script src="panel.js"></script>
</body>
</html>
